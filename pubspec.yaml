name: admin_santri_putra
description: Aplikasi administrasi santri putra untuk pendataan, detail, dan export administrasi pondok.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.0
  intl: ^0.19.0
  file_picker: ^10.3.10
  csv: ^6.0.0
  excel: ^4.0.6
  docx_creator: ^1.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
